server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/medical_cloud?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

mybatis-plus:
  configuration:
    #在映射实体或者属性时，将数据库中表名和字段名中的下划线去掉，按照驼峰命名法映射
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID

logging:
  level:
    com:
      medical:
        mapper: debug
        service: info
        controller: info

medical:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: medical-admin
    user-secret-key: medical-user
    # 设置jwt过期时间
    admin-ttl: 7200000
    user-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-token-name: authentication
